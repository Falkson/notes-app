<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anteckningar</title>
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/print.css" />
</head>
<body>
<div class="app">

  <!-- Titlebar (macOS drag-region) -->
  <div class="titlebar">
    <span class="titlebar-title">Anteckningar</span>
  </div>

  <div class="app-body">

    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Logo -->
      <div class="sidebar-logo">
        <img src="../notes.png" alt="Anteckningar" class="sidebar-logo-img" />
      </div>

      <!-- Nav: Anteckningar -->
      <div class="nav-item active" id="nav-notes" onclick="switchView('notes')">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Anteckningar
      </div>

      <div class="sidebar-spacer"></div>

      <!-- Nav: Inställningar (placeholder) -->
      <div class="nav-item" id="nav-settings" title="Inställningar – kommer snart">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Inställningar
      </div>
    </aside>

    <!-- Huvudinnehåll -->
    <div class="main">

      <!-- Kolumn 1: Anteckningslista -->
      <div class="col-list">
        <div class="list-header">
          <h2>Mina anteckningar</h2>
          <button class="btn-icon" onclick="newNote()" title="Ny anteckning">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>

        <div class="notes-list" id="notesList">
          <!-- Fylls i av JS -->
        </div>
      </div>

      <!-- Kolumn 2: Editor -->
      <div class="col-editor" id="colEditor">

        <!-- Tom vy -->
        <div class="editor-empty" id="editorEmpty">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <h3>Välj en anteckning</h3>
          <p>Välj en anteckning i listan eller skapa en ny.</p>
          <button class="btn-primary" onclick="newNote()" style="margin-top:8px">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Ny anteckning
          </button>
        </div>

        <!-- Aktiv editor (döljs initialt) -->
        <div id="editorActive" style="display:none; flex-direction:column; flex:1; overflow:hidden;">

          <!-- Print header (syns bara vid PDF) -->
          <div class="print-header">
            <h1>Anteckning</h1>
          </div>

          <!-- Editor header med knappar -->
          <div class="editor-header">
            <span class="section-label">Redigera anteckning</span>
            <div class="editor-actions">
              <button class="btn-ghost" onclick="exportPDF()" title="Exportera som PDF">
                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Exportera PDF
              </button>
              <button class="btn-primary" onclick="saveNote()" title="Spara (⌘S)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Spara
              </button>
              <button class="btn-danger" onclick="deleteNote()" title="Ta bort anteckning">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                Ta bort
              </button>
            </div>
          </div>

          <!-- Editor body -->
          <div class="editor-body">

            <!-- Datum & tid -->
            <div class="datetime-wrapper">
              <label class="field-label" for="noteDate">Datum &amp; tid</label>
              <input type="datetime-local" id="noteDate" />
            </div>

            <!-- Rubrik -->
            <div class="note-title-wrapper">
              <label class="field-label" for="noteTitle">Rubrik</label>
              <input
                type="text"
                id="noteTitle"
                class="note-title-input"
                placeholder="Skriv en rubrik (valfritt)..."
              />
            </div>

            <!-- Fritext -->
            <div class="note-textarea-wrapper">
              <label class="field-label" for="noteBody">Anteckning</label>
              <textarea
                class="note-textarea"
                id="noteBody"
                placeholder="Skriv din anteckning här..."
                oninput="updateCharCount()"
              ></textarea>
              <span class="char-count" id="charCount">0 tecken</span>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Custom Modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-box">
    <h3 class="modal-title" id="modalTitle"></h3>
    <p class="modal-message" id="modalMessage"></p>
    <div class="modal-actions">
      <button class="btn-ghost" id="modalCancel"></button>
      <button class="btn-danger" id="modalConfirm"></button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
