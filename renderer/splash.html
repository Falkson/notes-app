<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #1a1c21;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    .splash-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
    }

    .logo {
      width: 220px;
      height: 220px;
      object-fit: contain;
      filter: drop-shadow(0 8px 32px rgba(107,156,245,0.18));
    }

    .tagline {
      font-family: -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #5c6370;
    }

    .loader {
      width: 40px;
      height: 2px;
      background: #2e3239;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: #6b9cf5;
      border-radius: 2px;
      animation: load 3.2s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes load {
      0%   { width: 0%; }
      60%  { width: 70%; }
      90%  { width: 92%; }
      100% { width: 100%; }
    }
  </style>
</head>
